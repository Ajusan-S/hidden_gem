<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Sri Lanka — Interactive Map · Hidden Gem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1510;--ink2:#131d16;--ink3:#192219;
  --surface:#f2ede3;--gold:#9a7238;--c-gold:#c4923a;
  --gold2:#b89050;--gold3:#cead6a;--green:#284438;--green2:#3a5e50;
  --neon:#39ff7a;--neonD:rgba(57,255,122,.15);--neonF:rgba(57,255,122,.06);
  --blue:#00e5ff;--blueD:rgba(0,229,255,.12);
  --orange:#ff6b35;--orangeD:rgba(255,107,53,.12);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Jost',sans-serif;background:var(--ink);color:var(--surface);-webkit-font-smoothing:antialiased;cursor:none}

/* CURSOR */
#cdot{position:fixed;z-index:99999;width:6px;height:6px;background:var(--gold3);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);will-change:left,top}
#cring{position:fixed;z-index:99998;width:28px;height:28px;border:1px solid rgba(184,144,80,.4);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s;will-change:left,top}
#cring.big{width:48px;height:48px;border-color:var(--neon)}
@media(hover:none){#cdot,#cring{display:none}body{cursor:auto}}

/* NAV */
#topnav{position:fixed;top:0;left:0;right:0;z-index:8000;padding:1rem 2%;display:flex;align-items:center;justify-content:space-between;background:rgba(13,21,16,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(255,255,255,.055)}
.nav-brand{text-decoration:none;display:flex;flex-direction:column;line-height:1.15}
.nav-brand-m{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;letter-spacing:.05em;color:var(--surface)}
.nav-brand-s{font-size:.48rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold2)}
.nav-center{display:flex;align-items:center;gap:.8rem}
.nav-tag{font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;padding:.22rem .8rem;border:1px solid rgba(57,255,122,.25);color:var(--neon);border-radius:100px;background:rgba(57,255,122,.05)}
.nav-count{font-size:.55rem;letter-spacing:.12em;color:rgba(242,237,227,.3)}
.nav-back{display:flex;align-items:center;gap:.45rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,237,227,.4);text-decoration:none;padding:.4rem .9rem;border:1px solid rgba(255,255,255,.08);border-radius:1px;transition:all .3s}
.nav-back:hover{color:var(--gold2);border-color:rgba(184,144,80,.3)}
.nav-back::before{content:'←';margin-right:.1rem}

/* MAP STAGE */
#stage{position:fixed;inset:0;top:58px;overflow:hidden;background:radial-gradient(ellipse 80% 70% at 50% 40%,#0a1a12,#060e08)}
/* animated ocean grid */
#stage::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(57,255,122,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,122,.025) 1px,transparent 1px);background-size:60px 60px;animation:gridDrift 18s linear infinite;pointer-events:none}
@keyframes gridDrift{0%{background-position:0 0}100%{background-position:60px 60px}}
/* ocean glow */
#stage::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 45% at 50% 50%,rgba(40,68,56,.18),transparent 70%);pointer-events:none}

/* MAP SVG WRAPPER */
#map-vp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:transform .55s cubic-bezier(.4,0,.2,1)}
#map-svg-wrap{position:relative;width:min(420px,52vw);transform-style:preserve-3d;filter:drop-shadow(0 30px 80px rgba(0,0,0,.7))}
@media(max-width:900px){#map-svg-wrap{width:min(340px,80vw)}}
@media(max-width:540px){#map-svg-wrap{width:min(280px,92vw)}}

/* DISTRICT PATHS */
.district{fill:#172818;stroke:#2a4535;stroke-width:.8;cursor:pointer;transition:fill .3s,filter .3s;transform-origin:center;transform-box:fill-box}
.district:hover{fill:#223d2c;filter:drop-shadow(0 0 8px rgba(57,255,122,.25))}
.district.active{fill:#1e3828;stroke:var(--neon);stroke-width:1.2;filter:drop-shadow(0 0 14px rgba(57,255,122,.35))}
.district.dim{fill:#111f14;stroke:#1e2e20;opacity:.65}

/* DISTRICT LABEL */
.d-label{font-family:'Jost',sans-serif;font-size:6px;fill:rgba(242,237,227,.45);pointer-events:none;text-anchor:middle;letter-spacing:.06em;text-transform:uppercase;font-weight:300}
.d-label.active-lbl{fill:var(--neon);font-weight:500}

/* MARKERS */
.marker-group{cursor:pointer}
.marker-pulse{r:5;fill:none;stroke-width:1;animation:mpulse 2.5s ease-out infinite}
.marker-dot{r:3.5;transition:r .3s}
.marker-group:hover .marker-dot{r:5}
/* Popular = gold */
.m-popular .marker-pulse{stroke:var(--gold2)}
.m-popular .marker-dot{fill:var(--gold2)}
/* Hidden = neon */
.m-hidden .marker-pulse{stroke:var(--neon)}
.m-hidden .marker-dot{fill:var(--neon)}
/* Sacred = blue */
.m-sacred .marker-pulse{stroke:var(--blue)}
.m-sacred .marker-dot{fill:var(--blue)}
/* Wildlife = orange */
.m-wildlife .marker-pulse{stroke:var(--orange)}
.m-wildlife .marker-dot{fill:var(--orange)}
@keyframes mpulse{0%{r:3;opacity:.8}100%{r:12;opacity:0}}

/* INFO PANEL */
#info-panel{position:fixed;right:0;top:58px;bottom:0;width:340px;background:rgba(13,21,16,.97);border-left:1px solid rgba(255,255,255,.07);transform:translateX(100%);transition:transform .45s cubic-bezier(.4,0,.2,1);z-index:7000;display:flex;flex-direction:column;overflow:hidden}
#info-panel.open{transform:translateX(0)}
.ip-close{position:absolute;top:.8rem;right:.8rem;width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(242,237,227,.4);font-size:.75rem;transition:all .3s;z-index:2}
.ip-close:hover{background:rgba(184,144,80,.12);color:var(--gold2);border-color:rgba(184,144,80,.25)}
.ip-district-header{padding:1.4rem 1.4rem .8rem;border-bottom:1px solid rgba(255,255,255,.055);background:rgba(57,255,122,.025)}
.ip-district-eyebrow{font-size:.52rem;letter-spacing:.32em;text-transform:uppercase;color:var(--neon);margin-bottom:.3rem}
.ip-district-name{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:400;color:var(--surface);margin-bottom:.18rem;line-height:1.2}
.ip-district-sub{font-size:.7rem;font-weight:300;color:rgba(242,237,227,.38)}
.ip-places-list{flex:1;overflow-y:auto;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.65rem}
.ip-places-list::-webkit-scrollbar{width:3px}
.ip-places-list::-webkit-scrollbar-track{background:rgba(255,255,255,.03)}
.ip-places-list::-webkit-scrollbar-thumb{background:rgba(184,144,80,.25);border-radius:2px}

/* PLACE CARD IN PANEL */
.ip-place{border:1px solid rgba(255,255,255,.065);border-radius:3px;overflow:hidden;cursor:pointer;transition:border-color .3s,transform .3s,box-shadow .3s;transform-style:preserve-3d;background:rgba(255,255,255,.02)}
.ip-place:hover{border-color:rgba(57,255,122,.28);transform:translateY(-3px) scale(1.01);box-shadow:0 12px 35px rgba(0,0,0,.45),0 0 0 1px rgba(57,255,122,.1)}
.ip-place-img-w{position:relative;overflow:hidden;aspect-ratio:16/9}
.ip-place-img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.65) saturate(.8);transition:transform .55s,filter .55s}
.ip-place:hover .ip-place-img{transform:scale(1.06);filter:brightness(.5) saturate(.95)}
.ip-place-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(13,21,16,.88) 100%);opacity:0;transition:opacity .4s}
.ip-place:hover .ip-place-overlay{opacity:1}
.ip-place-type-badge{position:absolute;top:.55rem;left:.55rem;padding:.15rem .6rem;border-radius:100px;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;backdrop-filter:blur(8px);border:1px solid}
.badge-popular{background:rgba(154,114,56,.2);border-color:rgba(184,144,80,.35);color:var(--gold3)}
.badge-hidden{background:rgba(57,255,122,.1);border-color:rgba(57,255,122,.3);color:var(--neon)}
.badge-sacred{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--blue)}
.badge-wildlife{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--orange)}
.ip-place-rating{position:absolute;top:.55rem;right:.55rem;padding:.15rem .6rem;background:rgba(13,21,16,.8);backdrop-filter:blur(8px);border-radius:100px;font-size:.6rem;color:var(--gold2);border:1px solid rgba(184,144,80,.2)}
/* hover detail overlay inside card */
.ip-place-detail{position:absolute;bottom:0;left:0;right:0;padding:.65rem .75rem;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);background:rgba(13,21,16,.92)}
.ip-place:hover .ip-place-detail{transform:translateY(0)}
.ip-detail-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:400;color:var(--surface);margin-bottom:.18rem}
.ip-detail-desc{font-size:.67rem;font-weight:300;color:rgba(242,237,227,.55);line-height:1.6}
.ip-place-body{padding:.7rem .8rem .75rem}
.ip-place-name{font-family:'Playfair Display',serif;font-size:1.02rem;font-weight:400;color:var(--surface);margin-bottom:.18rem}
.ip-place-meta{display:flex;align-items:center;justify-content:space-between}
.ip-place-cat{font-size:.6rem;font-weight:300;color:rgba(242,237,227,.38);letter-spacing:.08em}
.ip-place-stars{font-size:.65rem;color:var(--gold2)}

/* DISTRICT LIST SIDEBAR (left) */
#district-list{position:fixed;left:0;top:58px;bottom:0;width:210px;background:rgba(13,21,16,.95);border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;z-index:6000;padding:.6rem 0}
#district-list::-webkit-scrollbar{width:2px}
#district-list::-webkit-scrollbar-thumb{background:rgba(184,144,80,.2)}
.dl-label{font-size:.5rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(242,237,227,.22);padding:.5rem 1rem .3rem;margin-top:.3rem}
.dl-item{display:flex;align-items:center;gap:.6rem;padding:.52rem 1rem;cursor:pointer;transition:background .25s;border-left:2px solid transparent}
.dl-item:hover{background:rgba(57,255,122,.04);border-left-color:rgba(57,255,122,.3)}
.dl-item.active{background:rgba(57,255,122,.06);border-left-color:var(--neon)}
.dl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dl-name{font-size:.72rem;font-weight:300;color:rgba(242,237,227,.55);transition:color .25s}
.dl-item:hover .dl-name,.dl-item.active .dl-name{color:var(--surface)}
.dl-count{margin-left:auto;font-size:.58rem;color:rgba(242,237,227,.2);flex-shrink:0}

/* LEGEND */
#legend{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);z-index:7000;display:flex;gap:.8rem;align-items:center;background:rgba(13,21,16,.88);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.06);border-radius:100px;padding:.5rem 1.2rem;flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(242,237,227,.45);white-space:nowrap}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ZOOM CONTROLS */
#zoom-ctrl{position:fixed;right:360px;bottom:1.4rem;z-index:7000;display:flex;gap:.4rem;transition:right .45s cubic-bezier(.4,0,.2,1)}
#zoom-ctrl.shift{right:1.4rem}
.zc-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(13,21,16,.88);backdrop-filter:blur(12px);color:rgba(242,237,227,.55);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-family:'Jost',sans-serif}
.zc-btn:hover{background:rgba(57,255,122,.08);border-color:rgba(57,255,122,.3);color:var(--neon)}

/* HEATMAP TOGGLE */
#hm-toggle{position:fixed;left:220px;bottom:1.4rem;z-index:7000;display:flex;align-items:center;gap:.5rem;padding:.42rem 1rem;border:1px solid rgba(255,255,255,.08);border-radius:100px;background:rgba(13,21,16,.88);backdrop-filter:blur(12px);cursor:pointer;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(242,237,227,.4);transition:all .3s}
#hm-toggle:hover,#hm-toggle.on{border-color:rgba(57,255,122,.3);color:var(--neon)}
#hm-toggle .hm-ico{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,rgba(57,255,122,.8),transparent);transition:opacity .3s}

/* TOOLTIP on marker hover */
#mtt{position:fixed;z-index:8500;pointer-events:none;background:rgba(13,21,16,.95);border:1px solid rgba(255,255,255,.1);border-radius:2px;padding:.35rem .75rem;font-size:.62rem;color:var(--surface);opacity:0;transition:opacity .2s;white-space:nowrap;backdrop-filter:blur(10px)}

@media(max-width:900px){
  #district-list{display:none}
  #map-vp{left:0}
  #zoom-ctrl{right:1.4rem}
  #zoom-ctrl.shift{right:1.4rem}
  #hm-toggle{left:1rem}
  #info-panel{width:min(340px,100vw)}
  #legend{left:1rem;right:1rem;transform:none;border-radius:8px}
}
@media(max-width:540px){
  #info-panel{top:58px;left:0;right:0;width:100%;border-left:none;border-top:1px solid rgba(255,255,255,.07)}
  #legend{display:none}
}
</style>
</head>

</div>

<script>
/* ─── CURSOR ─── */
const dot=document.getElementById('cdot'),ring=document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function aC(){
  dot.style.left=mx+'px';dot.style.top=my+'px';
  rx+=(mx-rx)*.13;ry+=(my-ry)*.13;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(aC);
})();

  {id:"ratnapura",name:"Ratnapura",province:"Sabaragamuwa",path:"M 162 368 L 180 360 L 196 364 L 198 380 L 188 392 L 168 392 L 154 382 Z",cx:176,cy:377,color:"hidden"},

  {id:"moneragala",name:"Monaragala",province:"Uva",path:"M 244 376 L 264 368 L 282 372 L 284 392 L 270 404 L 248 404 L 232 392 L 236 380 Z",cx:258,cy:387,color:"wildlife"},

/* ─── PLACES DATA: 3 per district (75 total) ─── */

function buildSidebar(){
  const c=document.getElementById('dl-inner');
  const provinces=[...new Set(DISTRICTS.map(d=>d.province))];
  provinces.forEach(prov=>{
    const lbl=document.createElement('div');lbl.className='dl-label';lbl.textContent=prov;c.appendChild(lbl);
    DISTRICTS.filter(d=>d.province===prov).forEach(d=>{
      const item=document.createElement('div');item.className='dl-item';item.id='dl-'+d.id;
      const places=PLACES[d.id]||[];
      item.innerHTML=`<div class="dl-dot" style="background:${TYPE_DOTS[d.color]}"></div><div class="dl-name">${d.name}</div><div class="dl-count">${places.length}</div>`;
      item.addEventListener('click',()=>selectDistrict(d.id));
      c.appendChild(item);
    });
  });
}

/* ─── BUILD SVG MAP ─── */
function buildMap(){
  const dg=document.getElementById('districts-g');
  const mg=document.getElementById('markers-g');

  DISTRICTS.forEach(d=>{
    // District path
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d.path);
    path.setAttribute('class','district');
    path.setAttribute('id','dp-'+d.id);
    path.setAttribute('data-id',d.id);
    path.addEventListener('click',()=>selectDistrict(d.id));
    dg.appendChild(path);
    // Label
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',d.cx);txt.setAttribute('y',d.cy+2);
    txt.setAttribute('class','d-label');txt.setAttribute('id','dl2-'+d.id);
    txt.textContent=d.name.length>9?d.name.slice(0,9)+'…':d.name;
    dg.appendChild(txt);
  });

  // Place markers
  DISTRICTS.forEach(d=>{
    const places=PLACES[d.id]||[];
    places.forEach((p,i)=>{
      // offset markers slightly from district center
      const angle=(i/places.length)*2*Math.PI-0.5;
      const r=16;
      const mx2=d.cx+Math.cos(angle)*r;
      const my2=d.cy+Math.sin(angle)*r;
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('class','marker-group m-'+p.type);
      g.setAttribute('transform',`translate(${mx2},${my2})`);
      g.setAttribute('data-did',d.id);g.setAttribute('data-pidx',i);
      const pulse=document.createElementNS('http://www.w3.org/2000/svg','circle');
      pulse.setAttribute('class','marker-pulse');
      pulse.style.animationDelay=(i*0.4+d.cx*0.01)+'s';
      const dot2=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot2.setAttribute('class','marker-dot');
      g.appendChild(pulse);g.appendChild(dot2);
      // marker hover tooltip
      g.addEventListener('mouseenter',e=>showMtt(p.name,e));
      g.addEventListener('mousemove',e=>moveMtt(e));
      g.addEventListener('mouseleave',hideMtt);
      g.addEventListener('click',e=>{e.stopPropagation();selectDistrict(d.id);});
      mg.appendChild(g);
    });
  });
}

/* ─── TOOLTIP ─── */
const mtt=document.getElementById('mtt');
function showMtt(name,e){mtt.textContent=name;mtt.style.opacity='1';moveMtt(e);}
function moveMtt(e){mtt.style.left=(e.clientX+14)+'px';mtt.style.top=(e.clientY-10)+'px';}
function hideMtt(){mtt.style.opacity='0';}

/* ─── PANEL ─── */
let activeDistrict=null;
function selectDistrict(id){
  if(activeDistrict===id){closePanel();return;}
  activeDistrict=id;
  const d=DISTRICTS.find(x=>x.id===id);
  if(!d)return;

  // Update district highlighting
  document.querySelectorAll('.district').forEach(p=>{p.classList.remove('active','dim');p.classList.add('dim')});
  document.querySelectorAll('.d-label').forEach(t=>t.classList.remove('active-lbl'));
  const active=document.getElementById('dp-'+id);
  if(active){active.classList.remove('dim');active.classList.add('active');}
  const lbl=document.getElementById('dl2-'+id);
  if(lbl)lbl.classList.add('active-lbl');

  // Sidebar
  document.querySelectorAll('.dl-item').forEach(i=>i.classList.remove('active'));
  const dlItem=document.getElementById('dl-'+id);if(dlItem)dlItem.classList.add('active');

  // Panel header
  document.getElementById('ip-eyebrow').textContent=d.province+' Province';
  document.getElementById('ip-dname').textContent=d.name+' District';
  document.getElementById('ip-dsub').textContent=(PLACES[id]||[]).length+' hidden gems curated for you';

  // Places
  const list=document.getElementById('ip-places');
  list.innerHTML='';
  const places=PLACES[id]||[];
  places.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='ip-place';
    card.style.opacity='0';card.style.transform='translateY(16px)';
    card.style.transition=`opacity .4s ${i*0.1}s,transform .4s ${i*0.1}s,border-color .3s,box-shadow .3s`;
    const badgeClass='badge-'+p.type;
    card.innerHTML=`
      <div class="ip-place-img-w">
        <img class="ip-place-img" src="${p.img}" alt="${p.name}" loading="lazy">
        <div class="ip-place-overlay"></div>
        <div class="ip-place-type-badge ${badgeClass}">${p.badge}</div>
        <div class="ip-place-rating">★ ${p.rating}</div>
        <div class="ip-place-detail">
          <div class="ip-detail-name">${p.name}</div>
          <div class="ip-detail-desc">${p.desc}</div>
        </div>
      </div>
      <div class="ip-place-body">
        <div class="ip-place-name">${p.name}</div>
        <div class="ip-place-meta">
          <div class="ip-place-cat">${p.cat}</div>
          <div class="ip-place-stars">★ ${p.rating}</div>
        </div>
      </div>`;
    list.appendChild(card);
    // add hover cursor
    card.addEventListener('mouseenter',()=>ring.classList.add('big'));
    card.addEventListener('mouseleave',()=>ring.classList.remove('big'));
    requestAnimationFrame(()=>requestAnimationFrame(()=>{card.style.opacity='1';card.style.transform='translateY(0)'}));
  });

  // Open panel
  const panel=document.getElementById('info-panel');
  panel.classList.add('open');
  document.getElementById('zoom-ctrl').classList.remove('shift');

  // Pan map slightly toward selected district
  panToDistrict(d);
}

function closePanel(){
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('zoom-ctrl').classList.add('shift');
  document.querySelectorAll('.district').forEach(p=>{p.classList.remove('active','dim')});
  document.querySelectorAll('.d-label').forEach(t=>t.classList.remove('active-lbl'));
  document.querySelectorAll('.dl-item').forEach(i=>i.classList.remove('active'));
  activeDistrict=null;
}

/* ─── ZOOM & PAN ─── */
let scale=1,tx=0,ty=0;
const vp=document.getElementById('map-vp');
function applyTransform(){vp.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}
function zoomIn(){scale=Math.min(scale*1.3,3);applyTransform();}
function zoomOut(){scale=Math.max(scale/1.3,0.5);applyTransform();}
function zoomReset(){scale=1;tx=0;ty=0;applyTransform();}
function panToDistrict(d){
  // Gentle pan — center on district
  const svgWrap=document.getElementById('map-svg-wrap');
  const rect=svgWrap.getBoundingClientRect();
  const svgW=rect.width,svgH=rect.height;
  const relX=d.cx/400,relY=d.cy/580;
  tx=(0.5-relX)*svgW*0.18;ty=(0.5-relY)*svgH*0.18;
  applyTransform();
}

// Mouse wheel zoom
document.getElementById('stage').addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.deltaY<0)scale=Math.min(scale*1.12,3);
  else scale=Math.max(scale/1.12,0.5);
  applyTransform();
},{passive:false});

// Drag to pan
let dragging=false,startX=0,startY=0,startTx=0,startTy=0;
const stage=document.getElementById('stage');
stage.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startY=e.clientY;startTx=tx;startTy=ty;stage.style.cursor='grabbing';});
document.addEventListener('mousemove',e=>{if(!dragging)return;tx=startTx+(e.clientX-startX);ty=startTy+(e.clientY-startY);applyTransform();});
document.addEventListener('mouseup',()=>{dragging=false;stage.style.cursor='';});

// Touch
let pt1=null,pt2=null;
stage.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;startTx=tx;startTy=ty;}else if(e.touches.length===2){pt1={x:e.touches[0].clientX,y:e.touches[0].clientY};pt2={x:e.touches[1].clientX,y:e.touches[1].clientY};}},{passive:true});
stage.addEventListener('touchmove',e=>{if(e.touches.length===1&&dragging){tx=startTx+(e.touches[0].clientX-startX);ty=startTy+(e.touches[0].clientY-startY);applyTransform();}else if(e.touches.length===2&&pt1&&pt2){const n1={x:e.touches[0].clientX,y:e.touches[0].clientY};const n2={x:e.touches[1].clientX,y:e.touches[1].clientY};const od=Math.hypot(pt2.x-pt1.x,pt2.y-pt1.y);const nd=Math.hypot(n2.x-n1.x,n2.y-n1.y);scale=Math.max(.5,Math.min(3,scale*(nd/od)));pt1=n1;pt2=n2;applyTransform();}},{passive:true});
stage.addEventListener('touchend',()=>{dragging=false;pt1=null;pt2=null;});

/* ─── HEATMAP ─── */
let hmOn=false;
function toggleHeatmap(){
  hmOn=!hmOn;
  document.getElementById('hm-toggle').classList.toggle('on',hmOn);
  document.querySelectorAll('.district').forEach(p=>{
    const id=p.getAttribute('data-id');
    const d=DISTRICTS.find(x=>x.id===id);
    if(hmOn){
      const hm={'popular':'rgba(154,114,56,.35)','hidden':'rgba(57,255,122,.18)','sacred':'rgba(0,229,255,.2)','wildlife':'rgba(255,107,53,.25)'};
      p.style.fill=hm[d.color]||'#223d2c';
    } else {
      p.style.fill='';
    }
  });
}

/* ─── INIT ─── */
buildSidebar();
buildMap();

// Cursor enlarges on interactables
document.querySelectorAll('a,button,.dl-item,.zc-btn,.marker-group').forEach(el=>{
  el.addEventListener('mouseenter',()=>ring.classList.add('big'));
  el.addEventListener('mouseleave',()=>ring.classList.remove('big'));
});
</script>
